name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-e2e:
    name: Run on Ubuntu (Keycloak ${{ matrix.keycloak-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        keycloak-version:
          - "25.0.6"
          - "26.0.7"
          - "26.2.4"
          - "26.5.5"

    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Set up ko
        uses: ko-build/setup-ko@v0.7

      - name: Running Test e2e
        run: |
          go mod tidy
          make test-e2e KEYCLOAK_VERSION=${{ matrix.keycloak-version }}
